services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
    ports:
      - "5434:5432"
    volumes:
      - relay-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  relay-postgres-data:
